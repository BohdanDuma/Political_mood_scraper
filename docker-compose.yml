

services:
  yt_scraper:
    build: .
    container_name: youtube_sentiment_scraper
    restart: always
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/youtube_analytics.db
      - HF_HOME=/app/.cache/huggingface
    volumes:
      - ./data:/app/data
      - ./YT_project.log:/app/YT_project.log
      - ./cache/huggingface/hub:/app/.cache/huggingface/hub